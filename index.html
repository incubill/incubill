<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incubill</title>

<!--
  DODO PAYMENTS SETUP (no backend required):
  This page uses a Dodo Payments static payment link for the
  "Subscribe Now" button below:
      https://checkout.dodopayments.com/buy/{PRODUCT_ID}?quantity=1&redirect_url={YOUR_URL}
  1. Replace PRODUCT_ID in the DODO_PAYMENT_LINK constant (bottom of this
     file, in the <script> section) with your real Product ID from the
     Dodo Payments Dashboard (looks like "pdt_xxxxxxxxxxxx").
  2. If your product is a subscription, configure the free trial length
     directly on the product in the Dodo Payments Dashboard (Products ->
     your product -> Trial period), since static payment links don't
     accept a trial-days query parameter.
  3. redirect_url tells Dodo where to send the customer after checkout;
     it defaults to this same page, which will then show a "Subscribed!"
     banner using the payment_id/status query params Dodo appends to the
     URL on return.
-->

<style>
  :root {
    --navy: #1a2a4a;
    --green: #1a7a3d;
  }
  body {
    background: #f4f6f9;
  }
  .app-header {
    background: var(--navy);
    color: #fff;
    padding: 18px 24px;
  }
  .app-header h1 {
    font-size: 1.4rem;
    margin: 0;
    font-weight: 700;
  }
  .app-header .subtitle {
    font-size: .85rem;
    opacity: .8;
  }
  .card-section {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 10px rgba(0,0,0,.07);
    padding: 28px;
    margin-bottom: 24px;
  }
  .card-section h2 {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 18px;
    border-bottom: 2px solid #eef0f4;
    padding-bottom: 10px;
  }

    min-width: 90px;
  }

    vertical-align: middle;
  }

    background: #e9f7ee;
    border: 1px solid #bfe6cc;
    border-radius: 10px;
    padding: 20px;
  }
  .grand-total-box .amount {
    font-size: 1.9rem;
    font-weight: 800;
    color: var(--green);
  }
  .btn-subscribe {
    background: #ffb400;
    color: #1a2a4a;
    font-weight: 700;
    border: none;
  }
  .btn-subscribe:hover {
    background: #ffc233;
    color: #1a2a4a;
  }
  .subscribed-banner {
    background: #e9f7ee;
    border: 1px solid #bfe6cc;
    color: var(--green);
    border-radius: 8px;
    padding: 12px 18px;
    margin-bottom: 20px;
    font-weight: 600;

  .trade-picker-wrap {
    background: #fff;
    border-bottom: 1px solid #e4e7ee;
    padding: 10px 24px;
  }
  .trade-picker-wrap label {
    font-size: .8rem;
    color: #6b7280;
    font-weight: 600;
    margin-right: 8px;
    white-space: nowrap;
  }
  #tradeSelect {
    max-width: 260px;

    .app-header h1 { font-size: 1.15rem; }
    .card-section { padding: 18px; }

/* ---------------------------------------------------------------------
   DODO PAYMENTS CONFIG
   Replace the product ID below with your real one from the Dodo
   Payments Dashboard. See the comment block in <head> for details.
--------------------------------------------------------------------- */
const DODO_PRODUCT_ID = "pdt_your_product_id_here";
const DODO_PAYMENT_BASE = "https://checkout.dodopayments.com/buy/";

function buildDodoPaymentLink() {
  const redirectUrl = window.location.origin + window.location.pathname;
  return `${DODO_PAYMENT_BASE}${DODO_PRODUCT_ID}?quantity=1&redirect_url=${encodeURIComponent(redirectUrl)}`;
}

function checkSubscriptionReturn() {
  const params = new URLSearchParams(window.location.search);
  const status = params.get("status");
  if (!status) return;

  const banner = document.getElementById("subscribedBanner");
  const bannerText = document.getElementById("subscribedBannerText");
  banner.classList.remove("d-none");

  if (status === "succeeded" || status === "active") {
    banner.classList.remove("d-none");
    bannerText.textContent = t("subscribedSuccess");
  } else {
    bannerText.textContent = t("subscribedFailed");
  }
}

/* ---------------------------------------------------------------------
   CURRENCY DETECTION & FORMATTING
   Note: this only controls what currency symbol/format is shown on the
   estimate itself. It has no effect on Dodo Payments checkout — Dodo
   is a Merchant of Record and localizes the subscription charge
   currency on its own hosted checkout page based on the payer's
   location, independently of anything here.
--------------------------------------------------------------------- */
let currentCurrencyCode = "USD";
let currencyIsAuto = true;

// Best-effort mapping so symbols look right even if Intl can't resolve one.
const CURRENCY_SYMBOLS = {
  USD: "$", EUR: "€", GBP: "£", INR: "₹", AUD: "A$", CAD: "C$",
  JPY: "¥", AED: "د.إ", ZAR: "R", SGD: "S$",
};

function getCurrencySymbol(code) {
  if (CURRENCY_SYMBOLS[code]) return CURRENCY_SYMBOLS[code];
  try {
    const parts = new Intl.NumberFormat(navigator.language || "en-US", {
      style: "currency", currency: code, currencyDisplay: "narrowSymbol",
    }).formatToParts(0);
    const symbolPart = parts.find(p => p.type === "currency");
    return symbolPart ? symbolPart.value : code;
  } catch (e) {
    return code;
  }
}

function formatMoney(amount) {
  try {
    return new Intl.NumberFormat(navigator.language || "en-US", {
      style: "currency",
      currency: currentCurrencyCode,
      currencyDisplay: "narrowSymbol",
    }).format(amount);
  } catch (e) {
    // Fallback if the browser doesn't recognize the currency code
    return `${getCurrencySymbol(currentCurrencyCode)}${amount.toFixed(2)}`;
  }
}

function setCurrency(code, userInitiated = false) {
  if (code === "auto") {
    currencyIsAuto = true;
    detectCurrencyByLocation();
    return;
  }
  currencyIsAuto = false;
  currentCurrencyCode = code;
  refreshCurrencyDisplay();
}

function refreshCurrencyDisplay() {
  const symbol = getCurrencySymbol(currentCurrencyCode);

  document.getElementById("unitPriceHeader").textContent = t("unitPriceHeader").replace("{symbol}", symbol);
  document.getElementById("totalHeader").textContent = t("totalHeader").replace("{symbol}", symbol);
  document.getElementById("travelFeeCurrencyLabel").textContent = symbol;

  const note = document.getElementById("currencyDetectNote");
  note.textContent = currencyIsAuto ? `Detected: ${currentCurrencyCode}` : "";

  calculateTotals();
}

async function detectCurrencyByLocation() {
  const note = document.getElementById("currencyDetectNote");
  note.textContent = "Detecting location…";
  try {
    // Free IP-geolocation lookup; no key required for light usage.
    const res = await fetch("https://ipapi.co/json/");
    if (!res.ok) throw new Error("Lookup failed");
    const data = await res.json();
    if (data && data.currency) {
      currentCurrencyCode = data.currency;
    } else {
      currentCurrencyCode = guessCurrencyFromLocale();
    }
  } catch (e) {
    // Fall back to guessing from the browser's locale if the lookup
    // fails (e.g. offline, blocked, rate-limited).
    currentCurrencyCode = guessCurrencyFromLocale();
  }
  refreshCurrencyDisplay();
}

function guessCurrencyFromLocale() {
  const locale = navigator.language || "en-US";
  const region = locale.split("-")[1];
  const REGION_CURRENCY = {
    US: "USD", GB: "GBP", IN: "INR", AU: "AUD", CA: "CAD",
    JP: "JPY", AE: "AED", ZA: "ZAR", SG: "SGD",
    DE: "EUR", FR: "EUR", ES: "EUR", IT: "EUR", NL: "EUR", IE: "EUR",
  };
  return REGION_CURRENCY[region] || "USD";
}

let currentLangCode = "en";
let languageIsAuto = true;

function t(key) {
  const dict = TRANSLATIONS[currentLangCode] || TRANSLATIONS.en;
  return dict[key] !== undefined ? dict[key] : TRANSLATIONS.en[key];
}

function tPdf(key) {
  const dict = TRANSLATIONS[currentLangCode];
  const pdfDict = (dict && dict.pdf) ? dict.pdf : TRANSLATIONS.en.pdf;
  return pdfDict[key];
}

function applyLanguage() {
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    const val = t(key);
    if (val !== undefined) el.textContent = val;
  });

  // RTL support for Arabic
  document.documentElement.setAttribute("dir", currentLangCode === "ar" ? "rtl" : "ltr");
  document.documentElement.setAttribute("lang", currentLangCode);

  const note = document.getElementById("languageDetectNote");
  note.textContent = languageIsAuto ? `Detected: ${currentLangCode}` : "";

  // The subscribed banner (if visible) and currency-dependent headers
  // both contain translated + dynamic content, so refresh them too.
  refreshCurrencyDisplay();
}

function setLanguage(code, userInitiated = false) {
  if (code === "auto") {
    languageIsAuto = true;
    detectLanguageFromBrowser();
    return;
  }
  languageIsAuto = false;
  currentLangCode = code;
  applyLanguage();
}

function detectLanguageFromBrowser() {
  const browserLang = (navigator.language || "en").split("-")[0].toLowerCase();
  currentLangCode = TRANSLATIONS[browserLang] ? browserLang : "en";
  applyLanguage();
}

let currentTrade = "plumber";

function applyTrade(tradeKey, isInitialLoad = false) {
  const previousTrade = currentTrade;
  const trade = TRADES[tradeKey];

  // Only reset the job table to trade defaults on an explicit trade switch,
  // not silently in the background, so we don't wipe in-progress work.
  if (!isInitialLoad && !confirm(t("confirmTradeSwitch"))) {
    document.getElementById("tradeSelect").value = previousTrade; // revert dropdown
    return;
  }

  currentTrade = tradeKey;
  document.getElementById("tradeIcon").className = `fa-solid ${trade.icon} me-2`;
  document.getElementById("tradeSubtitle").textContent = `· ${trade.label}`;
  document.title = `Incubill · ${trade.label}`;

  document.getElementById("jobTableBody").innerHTML = "";
  trade.rows.forEach(r => addRow(r.desc, r.qty, r.price));
  calculateTotals();
}

function init() {
  document.getElementById("estimateDate").valueAsDate = new Date();
  document.getElementById("estimateNumber").value = generateEstimateNumber();
  document.getElementById("subscribeBtn").href = buildDodoPaymentLink();
  detectLanguageFromBrowser();
  applyTrade("plumber", true);
  detectCurrencyByLocation();
  checkSubscriptionReturn();
}

function generateEstimateNumber() {
  const num = Math.floor(1000 + Math.random() * 9000);
  return `EST-${num}`;
}

function addRow(desc = "", qty = 1, price = 0) {
  rowCounter++;
  const tbody = document.getElementById("jobTableBody");
  const tr = document.createElement("tr");
  tr.dataset.rowId = rowCounter;
  tr.innerHTML = `
    <td class="row-index">${tbody.children.length + 1}</td>
    <td><input type="text" class="form-control desc-input" value="${desc}"></td>
    <td><input type="number" class="form-control qty-input" value="${qty}" min="0" step="1" onchange="calculateTotals()" oninput="calculateTotals()"></td>
    <td><input type="number" class="form-control price-input" value="${price.toFixed ? price.toFixed(2) : price}" min="0" step="0.01" onchange="calculateTotals()" oninput="calculateTotals()"></td>
    <td class="row-total fw-semibold">${formatMoney(0)}</td>
    <td><button class="btn btn-sm btn-outline-danger" onclick="deleteRow(this)"><i class="fa-solid fa-xmark"></i></button></td>
  `;
  tbody.appendChild(tr);
  calculateTotals();
}

function deleteRow(btn) {
  const row = btn.closest("tr");
  row.remove();
  renumberRows();
  calculateTotals();
}

function renumberRows() {
  document.querySelectorAll("#jobTableBody tr").forEach((tr, i) => {
    tr.querySelector(".row-index").textContent = i + 1;
  });
}

function calculateTotals() {
  let subtotal = 0;
  document.querySelectorAll("#jobTableBody tr").forEach(tr => {
    const qty = parseFloat(tr.querySelector(".qty-input").value) || 0;
    const price = parseFloat(tr.querySelector(".price-input").value) || 0;
    const total = qty * price;
    tr.querySelector(".row-total").textContent = formatMoney(total);
    subtotal += total;
  });

  const travelFeeChecked = document.getElementById("travelFee").checked;
  const travelFeeAmount = parseFloat(document.getElementById("travelFeeAmount").value) || 0;
  const travelFee = travelFeeChecked ? travelFeeAmount : 0;
  const taxRate = parseFloat(document.getElementById("taxRate").value) || 0;
  const taxAmount = subtotal * taxRate;
  const grandTotal = subtotal + travelFee + taxAmount;

  document.getElementById("subtotal").value = formatMoney(subtotal);
  document.getElementById("taxAmount").value = formatMoney(taxAmount);
  document.getElementById("grandTotal").textContent = formatMoney(grandTotal);
}

function resetForm() {
  if (!confirm(t("confirmReset"))) return;
  document.getElementById("clientName").value = "";
  document.getElementById("clientEmail").value = "";
  document.getElementById("clientAddress").value = "";
  document.getElementById("estimateDate").valueAsDate = new Date();
  document.getElementById("estimateNumber").value = generateEstimateNumber();
  document.getElementById("travelFee").checked = false;
  document.getElementById("travelFeeAmount").value = "30.00";
  document.getElementById("taxRate").value = "0.08";
  document.getElementById("jobTableBody").innerHTML = "";
  TRADES[currentTrade].rows.forEach(r => addRow(r.desc, r.qty, r.price));
  calculateTotals();
}

function buildEstimatePDF() {
  const clientName = document.getElementById("clientName").value.trim();

    alert(t("alertClientNameRequired"));
    document.getElementById("clientName").focus();
    return null;
  }

  const clientEmail = document.getElementById("clientEmail").value.trim();
  const clientAddress = document.getElementById("clientAddress").value.trim();
  const estimateDate = document.getElementById("estimateDate").value;
  const estimateNumber = document.getElementById("estimateNumber").value;
  const travelFeeChecked = document.getElementById("travelFee").checked;
  const travelFeeAmount = parseFloat(document.getElementById("travelFeeAmount").value) || 0;
  const taxRateSelect = document.getElementById("taxRate");
  const taxRatePercent = (parseFloat(taxRateSelect.value) * 100).toFixed(0);

  // jsPDF's built-in fonts only render Latin characters, so currency
  // *symbols* like ₹, د.إ, or ¥ can come out blank/garbled in the PDF.
  // We use the currency code (e.g. "INR 1,234.00") in the PDF instead —
  // it's unambiguous everywhere and always renders correctly.
  const pdfMoney = (amount) => {
    try {
      return new Intl.NumberFormat(navigator.language || "en-US", {
        style: "currency",
        currency: currentCurrencyCode,
        currencyDisplay: "code",
      }).format(amount);
    } catch (e) {
      return `${currentCurrencyCode} ${amount.toFixed(2)}`;
    }
  };

  const rows = [];
  document.querySelectorAll("#jobTableBody tr").forEach(tr => {
    const desc = tr.querySelector(".desc-input").value;
    const qty = parseFloat(tr.querySelector(".qty-input").value) || 0;
    const price = parseFloat(tr.querySelector(".price-input").value) || 0;
    rows.push([qty, desc, pdfMoney(price), pdfMoney(qty * price)]);
  });

  let subtotal = 0;
  document.querySelectorAll("#jobTableBody tr").forEach(tr => {
    const qty = parseFloat(tr.querySelector(".qty-input").value) || 0;
    const price = parseFloat(tr.querySelector(".price-input").value) || 0;
    subtotal += qty * price;
  });
  const travelFee = travelFeeChecked ? travelFeeAmount : 0;
  const taxRate = parseFloat(taxRateSelect.value) || 0;
  const taxAmount = subtotal * taxRate;
  const grandTotal = subtotal + travelFee + taxAmount;

  const subtotalText = pdfMoney(subtotal);
  const taxAmountText = pdfMoney(taxAmount);
  const grandTotalText = pdfMoney(grandTotal);

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  // Outer border
  doc.setDrawColor(26, 42, 74);
  doc.setLineWidth(0.5);
  doc.rect(8, 8, 194, 281);

  // Header
  doc.setFontSize(20);
  doc.setFont(undefined, "bold");
  doc.text(tPdf("title"), 105, 22, { align: "center" });

  // Company placeholder, top right
  doc.setFontSize(9);
  doc.setFont(undefined, "normal");
  doc.text(tPdf("companyPlaceholder"), 194, 16, { align: "right" });

  // Client details
  doc.setFontSize(11);
  let y = 40;
  doc.setFont(undefined, "bold");
  doc.text(tPdf("billTo"), 14, y);
  doc.setFont(undefined, "normal");
  doc.text(clientName, 14, y + 6);
  if (clientEmail) doc.text(clientEmail, 14, y + 12);
  if (clientAddress) doc.text(clientAddress, 14, y + 18);

  doc.setFont(undefined, "bold");
  doc.text(tPdf("estimateDate"), 138, y);
  doc.setFont(undefined, "normal");
  doc.text(estimateDate || "-", 176, y);

  doc.setFont(undefined, "bold");
  doc.text(tPdf("estimateNumber"), 138, y + 6);
  doc.setFont(undefined, "normal");
  doc.text(estimateNumber, 176, y + 6);

  // Itemized table
  doc.autoTable({
    startY: y + 28,
    head: [[tPdf("qty"), tPdf("description"), tPdf("unitPrice"), tPdf("total")]],
    body: rows,
    theme: "grid",
    headStyles: { fillColor: [26, 42, 74] },
    margin: { left: 14, right: 14 },
  });

  let finalY = doc.lastAutoTable.finalY + 10;

  doc.setFontSize(11);
  doc.setFont(undefined, "normal");
  doc.text(tPdf("subtotal"), 140, finalY);
  doc.text(subtotalText, 176, finalY, { align: "right" });
  finalY += 6;

  if (travelFeeChecked) {
    doc.text(tPdf("travelFee"), 140, finalY);
    doc.text(pdfMoney(travelFeeAmount), 176, finalY, { align: "right" });
    finalY += 6;
  }

  doc.text(`${tPdf("tax")} (${taxRatePercent}%):`, 140, finalY);
  doc.text(taxAmountText, 176, finalY, { align: "right" });
  finalY += 9;

  doc.setFont(undefined, "bold");
  doc.setFontSize(13);
  doc.text(tPdf("grandTotal"), 140, finalY);
  doc.text(grandTotalText, 176, finalY, { align: "right" });

  finalY += 16;
  doc.setFont(undefined, "italic");
  doc.setFontSize(9);
  doc.text(tPdf("terms"), 14, finalY);

  doc.setFont(undefined, "normal");
  doc.setFontSize(10);
  doc.text(tPdf("footer"), 105, 282, { align: "center" });

  const filename = `${estimateNumber}_${clientName.replace(/\s+/g, "_")}.pdf`;
  const summaryText =
    `${tPdf("title")} ${estimateNumber}\n` +
    `${t("clientName")}: ${clientName}\n` +
    `${t("grandTotalLabel")}: ${grandTotalText}`;

  return { doc, filename, summaryText, clientEmail, estimateNumber, grandTotalText };
}

function generatePDF() {
  const result = buildEstimatePDF();
  if (!result) return;
  result.doc.save(result.filename);
}

/* ---------------------------------------------------------------------
   SHARING
   - shareEstimate(): uses the native Web Share API (navigator.share)
     with the actual PDF file attached, when the browser/device supports
     it — this is what shows the phone's normal share sheet (WhatsApp,
     Email, Messages, AirDrop, etc.) with the file already attached.
     Supported on most mobile browsers; not supported on most desktop
     browsers, which is a platform limitation, not something this code
     can work around.
   - shareViaWhatsApp() / shareViaEmail(): universal fallback that works
     everywhere. Browsers can't attach a file to a WhatsApp or mailto
     link directly (no API allows it), so these download the PDF first
     and then open WhatsApp/Email with the estimate summary pre-filled
     — the plumber just attaches the already-downloaded file.
--------------------------------------------------------------------- */
async function shareEstimate() {
  const result = buildEstimatePDF();
  if (!result) return;

  try {
    const blob = result.doc.output("blob");
    const file = new File([blob], result.filename, { type: "application/pdf" });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: result.filename,
        text: result.summaryText,
      });
      return;
    }
  } catch (e) {
    // If the user cancels the native share sheet, do nothing further.
    if (e && e.name === "AbortError") return;
  }

  // Fallback for browsers without file-sharing support (most desktops):
  // download the PDF and let the plumber attach it manually.
  result.doc.save(result.filename);
  alert(t("shareFallbackNote"));
}

function shareViaWhatsApp() {
  const result = buildEstimatePDF();
  if (!result) return;
  result.doc.save(result.filename);
  const text = encodeURIComponent(result.summaryText + "\n\n" + t("shareAttachNote"));
  window.open(`https://wa.me/?text=${text}`, "_blank");
}

function shareViaEmail() {
  const result = buildEstimatePDF();
  if (!result) return;
  result.doc.save(result.filename);
  const subject = encodeURIComponent(`${tPdf("title")} ${result.estimateNumber}`);
  const body = encodeURIComponent(result.summaryText + "\n\n" + t("shareAttachNote"));
  const to = result.clientEmail || "";
  window.location.href = `mailto:${to}?subject=${subject}&body=${body}`;
}

window.onload = init;
</script>
