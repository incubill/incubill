{% extends "base.html" %}
{% block title %}Choose Your Plan · Incubill{% endblock %}
{% block content %}
<div class="auth-card" style="max-width:520px;">
  <h1><i class="fa-solid fa-crown me-2"></i>Choose Your Plan</h1>
  <p class="text-muted mb-4">Start your 7-day free trial — cancel anytime, no questions asked.</p>

  <div class="d-grid gap-3">
    <a href="{{ url_for('create_checkout', plan='monthly') }}" class="btn btn-outline-secondary btn-lg d-flex justify-content-between align-items-center px-4 py-3">
      <span><strong>Monthly</strong><br><span class="text-muted small">Billed every month</span></span>
      <span class="fs-5">$19<span class="text-muted small">/mo</span></span>
    </a>
    <a href="{{ url_for('create_checkout', plan='yearly') }}" class="btn btn-primary-navy btn-lg d-flex justify-content-between align-items-center px-4 py-3">
      <span><strong>Yearly</strong> <span class="badge text-bg-warning ms-1">Save $38</span><br><span class="text-white-50 small">Billed once a year</span></span>
      <span class="fs-5">$190<span class="text-white-50 small">/yr</span></span>
    </a>
  </div>

  <p class="text-center text-muted mt-4 mb-0">
    <a href="{{ url_for('logout') }}">Log out</a>
  </p>
</div>
{% endblock %}
